# Nginx 站点配置 - 青年驿站聚合查询
# 路径: /etc/nginx/sites-available/youth-station

server {
    listen 80;
    listen [::]:80;
    server_name yuexinys.cn www.yuexinys.cn;

    # 备案完成 + 申请 SSL 证书后，下面取消注释强制 HTTPS：
    # return 301 https://$host$request_uri;

    client_max_body_size 32M;

    # 静态资源直出（Flask 的 static/）
    location /static/ {
        alias /opt/youth-station/web/static/;
        expires 7d;
        access_log off;
    }

    # 用户上传的图片/附件
    location /uploads/ {
        alias /opt/youth-station/web/uploads/;
        expires 30d;
    }

    # 业务请求转发到 Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }
}

